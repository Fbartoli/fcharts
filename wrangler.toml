# Cloudflare Pages config for the FChart marketing site + waitlist function.
# The static site is built by `pnpm build:site` into dist-site/; the Pages Function in
# functions/api/waitlist.ts is bundled by Cloudflare automatically.
name = "fcharts-site"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist-site"

# D1 (SQLite) binding exposed to the function as `env.DB`. The database + `waitlist` table
# were created in the Cloudflare dashboard (2026-07-03); the schema is migrations/0001_waitlist.sql.
[[d1_databases]]
binding = "DB"
database_name = "fcharts-waitlist"
database_id = "d65cd4d0-58cc-4823-9022-f00750a393be"
