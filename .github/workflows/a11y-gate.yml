# Sightline's own accessibility gate — proves the chart layer stays WCAG 2.2 AA conformant on
# every change. Runs the sightline-audit CLI against the demo fixture; the job fails (exit 1) on
# any regression below the committed baseline, and always uploads the regenerated ACR.
#
# Integrators run the equivalent against their own fixture — see compliance/ci-gate.md and the
# worked example in the README. Playwright/axe-core are dev/peer deps installed only in CI.
name: a11y gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  sightline-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npx pnpm@11.4.0 install --frozen-lockfile
      - name: Install Chromium (audit engine)
        run: npx playwright install --with-deps chromium
      - name: Run accessibility gate (EN 301 549)
        # Exits non-zero on any conformance regression → blocks the PR. --stamp keeps the ACR
        # deterministic (commit date) so the artifact diffs cleanly between versions.
        run: >-
          node src/compliance/cli.ts
          --fixture ./a11y/fixture.ts
          --edition en301549 --edition wcag --edition section508
          --out ./compliance-out
          --stamp "$(git show -s --format=%cs HEAD)"
      - name: Upload Accessibility Conformance Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-conformance-report
          path: ./compliance-out
